<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halloween 🎃</title>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ── BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffe6f0;
      font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── FLOATING BACKGROUND ICONS ── */
    .bg-icons {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .icon {
      position: absolute;
      font-size: 2.2rem;
      opacity: 0.18;
      animation: drift var(--d) ease-in-out infinite;
    }
    @keyframes drift {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-22px) rotate(8deg); }
    }

    /* ── OVERLAY MODAL ── */
    .overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.35);
      z-index: 10;
      transition: opacity .4s;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-body {
      background: #fff7fa;
      border-radius: 22px;
      padding: 36px 40px 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(255,111,145,.25), 0 2px 8px rgba(0,0,0,.08);
      max-width: 380px;
      width: 90%;
      animation: pop-in .35s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop-in {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .overlay-emoji { font-size: 3.8rem; margin-bottom: 14px; display: block; animation: spin-once .6s .3s ease both; }
    @keyframes spin-once {
      from { transform: rotate(-20deg) scale(0.8); }
      to   { transform: rotate(0deg)  scale(1); }
    }

    .overlay-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #ff6f91;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .overlay-sub {
      font-size: 0.9rem;
      color: #c78fa0;
      margin-bottom: 26px;
    }

    .btn-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    .btn {
      border: none;
      padding: 13px 28px;
      min-height: 48px;
      border-radius: 30px;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(.96) !important; }

    .btn-yes {
      background: #ffb3c1;
      color: #fff;
      box-shadow: 0 4px 12px #ffb3c160;
    }
    .btn-yes:hover { background: #ff8c9f; transform: scale(1.06); box-shadow: 0 6px 18px #ff8c9f50; }

    .btn-no {
      background: #f0e6ff;
      color: #a87cc4;
      box-shadow: 0 4px 12px #e0c8ff40;
      position: fixed;
      transition: none;
      z-index: 20;
    }
    .btn-no:hover { background: #e8d5ff; }

    /* ── CELEBRATION SCREEN ── */
    #celebrate {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff0f6;
      z-index: 8;
      text-align: center;
      padding: 24px 16px;
    }
    #celebrate.show { display: flex; }
    #celebrate h2 { font-size: clamp(1.4rem, 5vw, 2rem); color: #ff6f91; margin-bottom: 10px; }
    #celebrate p  { color: #c78fa0; font-size: clamp(0.9rem, 3vw, 1.1rem); margin-bottom: 20px; }
    .confetti-row {
      font-size: clamp(1.6rem, 6vw, 3rem);
      letter-spacing: clamp(2px, 2vw, 8px);
      animation: bounce-row 1s ease-in-out infinite;
      word-break: break-all;
    }
    @keyframes bounce-row { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      .overlay-body {
        padding: 24px 18px 22px;
        border-radius: 16px;
        width: 92%;
      }
      .overlay-emoji { font-size: 3rem; margin-bottom: 10px; }
      .overlay-title { font-size: 1.1rem; }
      .overlay-sub   { font-size: 0.82rem; margin-bottom: 20px; }
      .btn-row       { gap: 10px; }
      .btn           { font-size: 0.95rem; padding: 12px 22px; }
      #scare-text    { font-size: clamp(1.4rem, 8vw, 2.4rem); letter-spacing: 3px; margin-top: 16px; }
      #scare-sub     { font-size: 0.82rem; letter-spacing: 1px; margin-top: 8px; }
      #scare-close   { margin-top: 24px; padding: 12px 24px; font-size: 0.9rem; }
    }

    /* ── JUMP SCARE ── */
    #scare {
      position: fixed; inset: 0;
      background: #000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 99;
    }
    #scare.show { display: flex; }

    #scare-skull {
      font-size: min(45vw, 45vh);
      animation: scare-zoom .12s ease-out forwards;
      filter: drop-shadow(0 0 60px #ff0000cc);
      line-height: 1;
    }
    @keyframes scare-zoom {
      from { transform: scale(.05) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
    }

    #scare-text {
      color: #ff2020;
      font-size: clamp(1.6rem, 5vw, 3.2rem);
      font-family: Impact, 'Arial Black', sans-serif;
      letter-spacing: 5px;
      text-shadow: 0 0 30px red, 0 0 60px red;
      margin-top: 24px;
      animation: blink-red .18s infinite;
    }
    @keyframes blink-red { 0%,100%{opacity:1} 50%{opacity:.3} }

    #scare-sub {
      color: #ff8888;
      font-size: 1rem;
      margin-top: 12px;
      letter-spacing: 2px;
      font-family: 'Comic Neue', cursive;
    }

    #scare-close {
      margin-top: 32px;
      background: transparent;
      border: 2px solid #ff3333;
      color: #ff3333;
      padding: 10px 30px;
      border-radius: 30px;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background .2s;
    }
    #scare-close:hover { background: #ff222220; }

    /* ── RED FLASH ── */
    #flash {
      position: fixed; inset: 0; background: red;
      pointer-events: none; z-index: 98;
      opacity: 0;
    }
  </style>
</head>
<body>

<!-- BACKGROUND DECORATIONS -->
<div class="bg-icons" id="bg"></div>

<!-- MAIN MODAL -->
<div class="overlay" id="overlay">
  <div class="overlay-body">
    <span class="overlay-emoji">🎃</span>
    <p class="overlay-title">Do you want to celebrate Halloween with me?</p>
    <p class="overlay-sub">It'll be fun, I promise~ 👀</p>
    <div class="btn-row">
      <button class="btn btn-yes" id="btn-yes">🎃 Yes!</button>
      <button class="btn btn-no"  id="btn-no">🕸 No</button>
    </div>
  </div>
</div>

<!-- CELEBRATION -->
<div id="celebrate">
  <div class="confetti-row">🎃👻🍬💀🕷️</div>
  <h2 style="margin-top:24px">Yay! Happy Halloween! 🎉</h2>
  <p>Get ready for a spooky good time...</p>
  <div class="confetti-row" style="animation-delay:.4s">🦇🕸️🌙⚰️🔮</div>
</div>

<!-- JUMP SCARE -->
<div id="scare">
  <div id="scare-skull">💀</div>
  <div id="scare-text">BOO!!! 😱</div>
  <div id="scare-sub">you thought you were safe... 😈</div>
  <button id="scare-close" onclick="closeScare()">i survived... barely</button>
</div>

<!-- FLASH -->
<div id="flash"></div>

<script>
  /* ── BACKGROUND ICONS ── */
  const ICONS = ['🎃','👻','🦇','🕷️','🕸','💀','🌙','⚰️','🍬','🔮','🧙'];
  const bg = document.getElementById('bg');
  const isMobile = window.innerWidth <= 480;
  const iconCount = isMobile ? 14 : 28;
  for (let i = 0; i < iconCount; i++) {
    const el = document.createElement('div');
    el.className = 'icon';
    el.textContent = ICONS[i % ICONS.length];
    const sz = isMobile
      ? (Math.random() * 1.0 + 1.0).toFixed(1)
      : (Math.random() * 1.8 + 1.4).toFixed(1);
    el.style.cssText = `left:${Math.random()*96}%;top:${Math.random()*96}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s;font-size:${sz}rem`;
    bg.appendChild(el);
  }

  /* ── "NO" BUTTON RUNS AWAY ── */
  const btnNo  = document.getElementById('btn-no');
  const btnYes = document.getElementById('btn-yes');
  let noEscapes = 0;

  function placeNoBtn() {
    const btnW = btnNo.offsetWidth  || 110;
    const btnH = btnNo.offsetHeight || 48;
    const margin = isMobile ? 12 : 24;
    const x = margin + Math.random() * Math.max(0, window.innerWidth  - btnW - margin * 2);
    const y = margin + Math.random() * Math.max(0, window.innerHeight - btnH - margin * 2);
    btnNo.style.left = x + 'px';
    btnNo.style.top  = y + 'px';
    btnNo.style.transform = 'none';
  }

  function updateNoLabel() {
    if (noEscapes === 3)  btnNo.textContent = '🕸 Nope';
    if (noEscapes === 6)  btnNo.textContent = '😤 Still no';
    if (noEscapes === 10) btnNo.textContent = '💀 FINE...';
  }

  // Initial position: just below the modal card center
  function initNoBtn() {
    const btnW = btnNo.offsetWidth  || 110;
    btnNo.style.left = ((window.innerWidth - btnW) / 2) + 'px';
    btnNo.style.top  = (window.innerHeight * 0.62) + 'px';
    btnNo.style.transform = 'none';
  }
  initNoBtn();
  window.addEventListener('resize', () => { if (noEscapes === 0) initNoBtn(); });

  // Desktop: flee on hover
  btnNo.addEventListener('mouseover', () => {
    noEscapes++;
    placeNoBtn();
    updateNoLabel();
  });

  // Mobile: flee on touchstart before tap registers
  btnNo.addEventListener('touchstart', (e) => {
    e.preventDefault();
    noEscapes++;
    updateNoLabel();
    if (noEscapes > 10) {
      triggerScare();
    } else {
      placeNoBtn();
    }
  }, { passive: false });

  btnNo.addEventListener('click', () => {
    triggerScare();
  });

  /* ── "YES" BUTTON ── */
  btnYes.addEventListener('click', () => {
    document.getElementById('overlay').classList.add('hidden');
    const cel = document.getElementById('celebrate');
    cel.classList.add('show');
    // After 3 seconds of fake celebration → SCARE
    setTimeout(() => {
      cel.classList.remove('show');
      triggerScare();
    }, 3000);
  });

  /* ── JUMP SCARE ── */
  function triggerScare() {
    screamSound();
    flashScreen();
    setTimeout(() => {
      document.getElementById('scare').classList.add('show');
    }, 120);
  }

  function closeScare() {
    document.getElementById('scare').classList.remove('show');
    // Show "you survived" message
    document.body.innerHTML += `
      <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff7fa;z-index:200;font-family:'Comic Neue',cursive;text-align:center;padding:20px;">
        <div style="font-size:5rem">🎃</div>
        <h2 style="color:#ff6f91;font-size:1.8rem;margin:16px 0 8px">Happy Halloween!</h2>
        <p style="color:#c78fa0;font-size:1rem">You survived... this time. 😈</p>
        <p style="color:#ffb3c1;font-size:2rem;margin-top:18px;letter-spacing:8px">👻🦇🕷️💀🎃</p>
      </div>`;
  }

  /* ── SCREEN FLASH ── */
  function flashScreen() {
    const flash = document.getElementById('flash');
    let count = 0;
    const interval = setInterval(() => {
      flash.style.opacity = count % 2 === 0 ? '1' : '0';
      count++;
      if (count > 5) { clearInterval(interval); flash.style.opacity = '0'; }
    }, 70);
  }

  /* ── SCREAM SOUND via Web Audio API ── */
  function screamSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      // Low rumble
      const rumble = ctx.createOscillator();
      const rGain  = ctx.createGain();
      rumble.type = 'sawtooth';
      rumble.frequency.setValueAtTime(60, ctx.currentTime);
      rumble.frequency.linearRampToValueAtTime(40, ctx.currentTime + 1);
      rGain.gain.setValueAtTime(0.5, ctx.currentTime);
      rGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1);
      rumble.connect(rGain);
      rGain.connect(ctx.destination);
      rumble.start();
      rumble.stop(ctx.currentTime + 1);

      // High scream
      const scream = ctx.createOscillator();
      const sGain  = ctx.createGain();
      scream.type = 'sawtooth';
      scream.frequency.setValueAtTime(200, ctx.currentTime);
      scream.frequency.exponentialRampToValueAtTime(1800, ctx.currentTime + .25);
      scream.frequency.exponentialRampToValueAtTime(600,  ctx.currentTime + .8);
      sGain.gain.setValueAtTime(0.7, ctx.currentTime);
      sGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.1);
      scream.connect(sGain);
      sGain.connect(ctx.destination);
      scream.start();
      scream.stop(ctx.currentTime + 1.1);
    } catch(e) {}
  }
</script>
</body>
</html>
